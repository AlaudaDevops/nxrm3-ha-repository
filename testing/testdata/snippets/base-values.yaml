secret:
  nexusAdminSecret:
    enabled: true
    existingSecret: "nexus-password"
    secretKey: "password"
  nexusSecret:
    enabled: true
    secretKeyfile: |
      {
        "active": "default",
        "keys": [
          {
            "id": "default",
            "key": "default-key"
          }
        ]
      }

statefulset:
  container:
    resources:
      requests:
        cpu: 2
        memory: "4Gi"
      limits:
        cpu: 4
        memory: "8Gi"
