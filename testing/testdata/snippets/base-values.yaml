global:
  registry:
    address: <config.{{.registry.cluster | default "152-231-registry.alauda.cn:60070"}}>
secret:
  nexusAdminSecret:
    enabled: true
    existingSecret: "nexus-password"
    secretKey: "password"
  nexusSecret:
    enabled: true
    secretKeyfile: |
      {
        "active": "default",
        "keys": [
          {
            "id": "default",
            "key": "default-key"
          }
        ]
      }

statefulset:
  container:
    resources:
      requests:
        cpu: 1
        memory: "1Gi"
      limits:
        cpu: 2
        memory: "4Gi"
